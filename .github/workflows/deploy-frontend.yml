name: 앱 서버 프론트 배포

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 서버에 접속해 프론트 갱신
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ${{ secrets.APP_SERVER_USER }}
          key: ${{ secrets.APP_SERVER_SSH_KEY }}
          port: ${{ secrets.APP_SERVER_PORT || 22 }}
          script: |
            set -e
            cd /home/ubuntu/src/lol_team_balance_tool_front2
            git fetch origin
            git reset --hard origin/main
            cd /home/ubuntu/app-stack
            sudo docker compose build lol-front
            sudo docker compose up -d lol-front
